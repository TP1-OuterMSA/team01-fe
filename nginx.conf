server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /team1 {
        # 경로에서 /team1 접두사를 제거하지 않음
        alias /usr/share/nginx/html;

        # 파일이 존재하면 직접 제공, 디렉토리면 index.html 제공, 둘 다 아니면 index.html로 폴백
        try_files $uri $uri/ /index.html;
    }

    # /team1/assets/... 경로 처리
    location ~ ^/team1/assets/(.*)$ {
        # 정확한 에셋 파일 경로 지정
        alias /usr/share/nginx/html/assets/$1;
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
        try_files $uri =404;
    }

    # 기본 라우팅 - 이 부분은 필요하지 않을 수 있음 (Ingress가 이미 라우팅 중)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}