server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /team1 {
        proxy_pass http://localhost:80;
    }

    # /team1/assets/... 경로 처리
    location ~ ^/team1/assets/(.*)$ {
        alias /usr/share/nginx/html/assets/$1;
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
