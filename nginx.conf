server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # /team1 경로로 접근했을 때
    location /team1/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # /team1/assets/ 경로로 접근할 때
    location /team1/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # /assets/ 경로로 접근할 때 처리 - 올바른 리다이렉트
    location /assets/ {
        rewrite ^/assets/(.*) /team1/assets/$1 permanent;
    }

    # React Router를 위한 설정
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # 404 에러 처리
    error_page 404 /index.html;
}